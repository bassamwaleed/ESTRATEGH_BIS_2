        }

        .tf-buttons {

            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .tf-btn {
            flex: 1;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.5em;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            transition: all 0.2s ease;
            background: white;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tf-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

            border-color: #28a745 !important;

            background-color: #28a745 !important;
            border-color: #28a745 !important;
            color: white !important;
            opacity: 0.8;

        .tf-btn:disabled {

            color: #764ba2;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.t;
            document.getElementById('q-curr').innerText = currentQuestion + 1;
            
            // تحديث شريط التقدم
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            // إعادة تفعيل الأزرار وإزالة الألوان
            const btns = document.querySelectorAll('.tf-btn');
            btns.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct-answer', 'wrong-answer', 'show-correct');
            });
        }

        function checkAnswer(userChoice) {
            // تعطيل الأزرار
            const btns = document.querySelectorAll('.tf-btn');
            btns.forEach(btn => btn.disabled = true);

            const correctChoice = questions[currentQuestion].a; // 0 أو 1
            const selectedBtn = document.getElementById('btn-' + userChoice);
            const correctBtn = document.getElementById('btn-' + correctChoice);

            if (userChoice === correctChoice) {
                selectedBtn.classList.add('correct-answer');
                score++;
            } else {
                selectedBtn.classList.add('wrong-answer');
                correctBtn.classList.add('show-correct');
            }

            document.getElementById('score-text').innerText = `النتيجة: ${score} من ${questions.length}`;

            // الانتقال التلقائي
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    document.getElementById('progress-fill').style.width = '100%';

                    `;
