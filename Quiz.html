        originalQuestions.forEach((q, index) => {
            q.id = index + 1;
        });

        // تحديث الحد الأقصى للإدخال
        document.getElementById('q-start').max = originalQuestions.length;
        document.getElementById('q-end').max = originalQuestions.length;
        document.getElementById('q-end').value = originalQuestions.length;
        document.getElementById('total-available').innerText = originalQuestions.length;

        let questions = [...originalQuestions];
        let currentQuestion = 0;
        let score = 0;
        let isRandom = false; 
        let showNumbers = true; // متغير جديد للتحكم في ظهور الأرقام
        let wrongAnswers = []; 

        function toggleShuffle() {
            isRandom = !isRandom;
            const btn = document.getElementById('shuffle-btn');
            if (isRandom) {
                btn.innerHTML = "<span>🔀</span> الترتيب: عشوائي";
                btn.classList.add('active');
            } else {
                btn.innerHTML = "<span>🔢</span> الترتيب: عادي";
                btn.classList.remove('active');
            }
            applySettings();
        }

        // دالة تبديل ظهور رقم السؤال
        function toggleShowNumbers() {
            showNumbers = !showNumbers;
            const btn = document.getElementById('show-num-btn');
            if (showNumbers) {
                btn.innerHTML = "<span>🆔</span> رقم السؤال: ظاهر";
                btn.classList.add('active');
            } else {
                btn.innerHTML = "<span>🆔</span> رقم السؤال: مخفي";
                btn.classList.remove('active');
            }
            // تحديث السؤال الحالي فوراً
            if (questions.length > 0 && currentQuestion < questions.length) {
                updateQuestionDisplay();
            }
        }

        function applySettings() {
            const startInput = document.getElementById('q-start');
            const endInput = document.getElementById('q-end');
            let start = parseInt(startInput.value);
            let end = parseInt(endInput.value);
            
            if (isNaN(start) || start < 1) start = 1;
            if (isNaN(end) || end > originalQuestions.length) end = originalQuestions.length;
            if (start > end) start = end;

            startInput.value = start;
            endInput.value = end;

            let selectedQuestions = originalQuestions.slice(start - 1, end);

            if (isRandom) {
                for (let i = selectedQuestions.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [selectedQuestions[i], selectedQuestions[j]] = [selectedQuestions[j], selectedQuestions[i]];
                }
            }

            questions = selectedQuestions;
            document.getElementById('q-total').innerText = questions.length;
            restartQuiz();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            wrongAnswers = []; 
            if (questions.length === 0) return;

            document.getElementById('quiz-container').innerHTML = `
                <div class="question" id="question-text">جاري تحميل الأسئلة...</div>
                <div class="options" id="options-container"></div>
                <div class="score-area" id="score-text">النتيجة: 0</div>
            `;
            loadQuestion();
        }

        // دالة مساعدة لتحديث نص السؤال فقط
        function updateQuestionDisplay() {
            const q = questions[currentQuestion];
            const qTextElement = document.getElementById('question-text');
            if (showNumbers) {
                qTextElement.innerText = q.id + ". " + q.t;
            } else {
                qTextElement.innerText = q.t;
            }
        }

        function loadQuestion() {
            updateQuestionDisplay();
            document.getElementById('q-curr').innerText = currentQuestion + 1;
            
            const progress = ((currentQuestion) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            const letters = ['أ', 'ب', 'ج', 'د'];

            questions[currentQuestion].o.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = `${letters[index]} - ${opt}`;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            const correctIndex = questions[currentQuestion].a;

            if (selectedIndex === correctIndex) {
                btnElement.classList.add('correct');
                score++;
            } else {
                btnElement.classList.add('wrong');
                allBtns[correctIndex].classList.add('correct');
                wrongAnswers.push({
                    q: questions[currentQuestion].t,
                    selected: questions[currentQuestion].o[selectedIndex],
                    correct: questions[currentQuestion].o[correctIndex],
                    qNum: questions[currentQuestion].id 
                });
            }

            document.getElementById('score-text').innerText = `النتيجة: ${score} من ${questions.length}`;

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 1500);
        }

        function showFinalResult() {
            document.getElementById('progress-fill').style.width = '100%';
            let resultHTML = `
                <h3>🎉 انتهى الامتحان!
                    متنسانيش بدعوه حلوه و صلي علي النبي</h3>
                <p style="font-size:1.5em; margin: 20px 0;">نتيجتك النهائية: <br> <strong>${score}</strong> من <strong>${questions.length}</strong></p>
                <button class="option-btn" onclick="restartQuiz()" style="background:#764ba2; color:white; border:none;">إعادة الاختبار</button>
            `;
            if (wrongAnswers.length > 0) {
                resultHTML += `
                    <br>
                    <button class="option-btn" onclick="showMistakes()" style="background:#e74c3c; color:white; border:none; margin-top: 10px;">عرض الإجابات الخاطئة</button>
                `;
            }
            document.getElementById('quiz-container').innerHTML = resultHTML;
        }

        function showMistakes() {
            let mistakesHTML = `<h3>ملخص الأخطاء</h3><div class="mistakes-container">`;
            wrongAnswers.forEach(item => {
                mistakesHTML += `
                    <div class="mistake-item">
                        <div class="mistake-q">س${item.qNum}: ${item.q}</div>
                        <div class="mistake-wrong">❌ إجابتك: ${item.selected}</div>
                        <div class="mistake-correct">✅ الصح: ${item.correct}</div>
                    </div>
                `;
            });
            mistakesHTML += `</div><button class="option-btn" onclick="restartQuiz()" style="background:#764ba2; color:white; border:none; margin-top: 15px;">إعادة الاختبار</button>`;
            document.getElementById('quiz-container').innerHTML = mistakesHTML;
        }

        applySettings();
    </script>
